name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}

          script: |
            set -e

            cd /home/ec2-user/aws-devops

            git pull origin main

            docker stop app || true
            docker rm app || true

            docker build -t app .

            docker run -d \
              -p 80:3000 \
              --name app \
              app
